# Render blueprint for Says Who?
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: push this repo to GitHub, then in Render choose
# "New > Blueprint" and point it at the repo. Set the `sync: false`
# secrets in the dashboard (they are intentionally not stored here).
services:
  - type: web
    name: says-who
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22.15.0"
      # Public (safe to expose to the browser)
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # Server-only secrets — set these in the Render dashboard, never in git
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
